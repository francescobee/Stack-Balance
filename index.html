<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- S12.1: theme-color matches --paper bg (Android Chrome status bar tint
       + iOS PWA standalone). viewport-fit=cover lets safe-area-inset env()
       return non-zero values inside the notch/dynamic-island area. -->
  <meta name="theme-color" content="#f3ead4" />
  <title>Stack &amp; Balance — Quarterly Rivals</title>

  <!-- Editorial typography: Fraunces (display) · Newsreader (body) · JetBrains Mono (numbers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..900,30..100&family=Newsreader:opsz,wght,ital@6..72,400..700,0;6..72,400..700,1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/board.css" />
  <link rel="stylesheet" href="styles/player.css" />

  <!-- PeerJS for P2P multiplayer (Phase 10). Loaded async — multiplayer
       feature gracefully degrades if CDN is down (Peer === undefined). -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
</head>
<body>
  <div id="app"></div>

  <script src="js/data.js"></script>
  <script src="js/visions.js"></script>
  <script src="js/scenarios.js"></script>
  <script src="js/util.js"></script>
  <script src="js/user.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/balance.js"></script>
  <script src="js/state.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>

  <!-- Phase 10: P2P multiplayer (PeerJS-based). Loaded after game.js so it can
       hook into game flow. Single-player works without it. -->
  <script src="js/multiplayer.js"></script>

  <!-- Phase 11: Hot Seat / pass-and-play local. No networking, single state. -->
  <script src="js/hotseat.js"></script>

  <!-- Render layer: split into sub-modules in S8.1.
       Order doesn't matter between sub-modules (all globals),
       but render.js MUST come last because it's the orchestrator. -->
  <script src="js/render-pyramid.js"></script>
  <script src="js/render-tableau.js"></script>
  <script src="js/render-sidebar.js"></script>
  <script src="js/render-masthead.js"></script>
  <script src="js/render-modals.js"></script>
  <script src="js/render-profile.js"></script>
  <script src="js/render-multiplayer.js"></script>
  <script src="js/render-hotseat.js"></script>
  <!-- Phase 12: tap-to-detail card overlay (mobile only — desktop bypasses) -->
  <script src="js/render-card-detail.js"></script>
  <script src="js/render.js"></script>

  <script src="js/main.js"></script>
</body>
</html>
